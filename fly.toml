# fly.toml — Fly.io deployment config for DistribCache
# Docs: https://fly.io/docs/reference/configuration/
#
# App name must be globally unique on Fly.io.
# Change "distribcache" below if the name is already taken.
# Run: flyctl launch --no-deploy   (first time, to register the app)
#      flyctl deploy                (every deploy after that)

app = "distribcache"
primary_region = "iad"   # US-East; change to nearest: lhr=London, nrt=Tokyo, syd=Sydney

[build]
  # Uses the existing multi-stage Dockerfile — no extra config needed.

[env]
  # PORT is already read in main.go; Fly injects 8080 automatically.
  # Add any other env vars here (e.g. LOG_LEVEL = "info").

[http_service]
  internal_port       = 8080
  force_https         = true   # Fly terminates TLS; your app stays plain HTTP
  auto_stop_machines  = false  # Keep the machine running 24/7 (showcase stays live)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/status"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"   # Smallest free-tier VM
  memory = "512mb"
