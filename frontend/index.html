<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DistribCache Dashboard</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --warn:      #d29922;
      --danger:    #f85149;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    8px;
      --font:      'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 16px; letter-spacing: -.3px;
    }
    .logo svg { color: var(--accent); }
    .node-badge {
      font-family: var(--font);
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      color: var(--muted);
    }
    .node-badge span { color: var(--accent); }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--accent2);
    }
    .live-dot::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.2); }
    }

    main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stat cards ──────────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-value.blue  { color: var(--accent); }
    .stat-value.green { color: var(--accent2); }
    .stat-value.orange { color: var(--warn); }

    /* ── Two-column panels ───────────────────────────────────── */
    .panels { display: grid; grid-template-columns: 280px 1fr; gap: 16px; margin-bottom: 28px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-body { padding: 16px 20px; }

    /* ── Peers list ──────────────────────────────────────────── */
    #peer-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    #peer-list li {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font); font-size: 12px;
      color: var(--text);
    }
    #peer-list li::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .no-peers { color: var(--muted); font-size: 13px; font-style: italic; }

    /* ── Upload form ─────────────────────────────────────────── */
    .form-row { display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .form-group input[type="text"],
    .form-group input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      font-family: var(--font);
    }
    .form-group input[type="text"]:focus,
    .form-group input[type="number"]:focus { border-color: var(--accent); }
    .file-drop {
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .file-drop:hover { border-color: var(--accent); background: rgba(88,166,255,.05); }
    .file-drop.dragover { border-color: var(--accent); background: rgba(88,166,255,.1); }
    .file-drop input { display: none; }
    .file-drop-label { color: var(--muted); font-size: 13px; }
    .file-drop-label span { color: var(--accent); cursor: pointer; }
    .file-name { font-family: var(--font); font-size: 12px; color: var(--accent2); margin-top: 5px; }
    .form-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 9px 20px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
      width: 100%;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .upload-result {
      font-family: var(--font);
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      display: none;
    }
    .upload-result.success { background: rgba(63,185,80,.1); border: 1px solid var(--accent2); color: var(--accent2); }
    .upload-result.error   { background: rgba(248,81,73,.1);  border: 1px solid var(--danger);  color: var(--danger); }

    /* ── Files table ─────────────────────────────────────────── */
    .files-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .files-panel .panel-header { justify-content: space-between; }
    .dedup-legend {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .dedup-legend::before {
      content: '';
      display: inline-block; width: 10px; height: 10px;
      border-radius: 2px;
      background: rgba(88,166,255,.15);
      border: 1px solid rgba(88,166,255,.4);
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid rgba(48,54,61,.6); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }
    .key-cell { font-family: var(--font); font-weight: 600; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hash-cell {
      font-family: var(--font);
      font-size: 11px;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .hash-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .hash-chip:hover { border-color: var(--accent); color: var(--accent); }
    .hash-chip.copied { border-color: var(--accent2); color: var(--accent2); }
    .size-cell { color: var(--muted); white-space: nowrap; }
    .ttl-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font); font-size: 11px; font-weight: 600;
      border-radius: 12px; padding: 3px 10px; white-space: nowrap;
    }
    .ttl-badge.infinite { background: rgba(63,185,80,.12); color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
    .ttl-badge.alive     { background: rgba(210,153,34,.12); color: var(--warn);    border: 1px solid rgba(210,153,34,.3); }
    .ttl-badge.expired   { background: rgba(248,81,73,.12);  color: var(--danger);  border: 1px solid rgba(248,81,73,.3); }
    .actions { display: flex; gap: 6px; }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      color: var(--muted);
    }
    .btn-icon.download:hover { border-color: var(--accent);  color: var(--accent); }
    .btn-icon.delete:hover   { border-color: var(--danger); color: var(--danger); }
    .empty-state {
      padding: 48px 0;
      text-align: center;
      color: var(--muted);
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    /* ── Dedup highlight ─────────────────────────────────────── */
    .dedup-row { background: rgba(88,166,255,.06) !important; }
    .dedup-row:hover { background: rgba(88,166,255,.1) !important; }
    .dedup-tag {
      font-size: 10px;
      background: rgba(88,166,255,.15);
      color: var(--accent);
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
    }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      transform: translateY(80px); opacity: 0;
      transition: transform .25s, opacity .25s;
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--accent2); color: var(--accent2); }
    #toast.error   { border-color: var(--danger);  color: var(--danger); }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v4c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 9v4c0 1.66 4.03 3 9 3s9-1.34 9-3V9"/>
      <path d="M3 13v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4"/>
    </svg>
    DistribCache
  </div>
  <div class="node-badge">Node: <span id="header-addr">—</span></div>
  <div class="live-dot">Live</div>
</header>

<!-- Main -->
<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Stored Files</div>
      <div class="stat-value blue" id="stat-files">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Connected Peers</div>
      <div class="stat-value green" id="stat-peers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Deduplicated Blobs</div>
      <div class="stat-value orange" id="stat-dedup">—</div>
    </div>
  </div>

  <!-- Peers + Upload -->
  <div class="panels">

    <!-- Peers -->
    <div class="panel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Connected Peers
      </div>
      <div class="panel-body">
        <ul id="peer-list"><li class="no-peers">No peers connected</li></ul>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
          <div class="form-group" style="gap:7px;">
            <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Connect new peer</label>
            <div style="display:flex;gap:6px;">
              <input type="text" id="inp-peer-addr" placeholder=":4001"
                style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;
                       color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--font);outline:none;"
                onkeydown="if(event.key==='Enter')connectPeer()" />
              <button onclick="connectPeer()"
                style="background:var(--accent);color:#000;border:none;border-radius:6px;
                       padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;"
                title="Dial peer">+ Connect</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Upload -->
    <div class="panel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload File
      </div>
      <div class="panel-body">
        <form id="upload-form" class="form-row">
          <div class="form-inline">
            <div class="form-group">
              <label for="inp-key">Key</label>
              <input type="text" id="inp-key" placeholder="e.g. photo.jpg" required />
            </div>
            <div class="form-group">
              <label for="inp-ttl">TTL (seconds, 0 = ∞)</label>
              <input type="number" id="inp-ttl" min="0" value="0" />
            </div>
          </div>
          <div class="form-group">
            <label>File</label>
            <div class="file-drop" id="file-drop">
              <input type="file" id="inp-file" />
              <div class="file-drop-label">
                Drop file here or <span onclick="document.getElementById('inp-file').click()">browse</span>
              </div>
              <div class="file-name" id="file-name-display"></div>
            </div>
          </div>
          <div class="upload-result" id="upload-result"></div>
          <button type="submit" class="btn-primary" id="upload-btn">Upload &amp; Distribute</button>
        </form>
      </div>
    </div>

  </div>

  <!-- Files table -->
  <div class="files-panel">
    <div class="panel-header">
      <span style="display:flex;align-items:center;gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Stored Files
      </span>
      <span class="dedup-legend">Highlighted = same content (dedup)</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>SHA1 Content Hash</th>
            <th>Size</th>
            <th>TTL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="files-tbody">
          <tr><td colspan="5" class="empty-state">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" color="#8b949e" style="margin:0 auto;display:block;">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
            <p>No files stored yet. Upload something above.</p>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '';   // same origin

  // ── State ──────────────────────────────────────────────────────
  let files  = [];
  let status = { addr: '—', peers: [], file_count: 0 };

  // ── Polling ────────────────────────────────────────────────────
  async function refresh() {
    try {
      const [stRes, fRes] = await Promise.all([
        fetch(`${API}/api/status`),
        fetch(`${API}/api/files`),
      ]);
      status = await stRes.json();
      files  = await fRes.json();
      renderStatus();
      renderFiles();
    } catch (e) {
      // server may not be ready yet
    }
  }

  // ── Render status ──────────────────────────────────────────────
  function renderStatus() {
    document.getElementById('header-addr').textContent = status.addr || '—';
    document.getElementById('stat-files').textContent  = status.file_count ?? 0;
    document.getElementById('stat-peers').textContent  = (status.peers || []).length;

    // Count unique hashes that appear more than once (dedup savings)
    const hashCount = {};
    (files || []).forEach(f => { hashCount[f.content_hash] = (hashCount[f.content_hash] || 0) + 1; });
    const dedupBlobs = Object.values(hashCount).filter(c => c > 1).length;
    document.getElementById('stat-dedup').textContent = dedupBlobs;

    // Peers
    const ul = document.getElementById('peer-list');
    if (!status.peers || status.peers.length === 0) {
      ul.innerHTML = '<li class="no-peers">No peers connected</li>';
    } else {
      ul.innerHTML = status.peers.map(p => `<li>${p}</li>`).join('');
    }
  }

  // ── Render files table ─────────────────────────────────────────
  function renderFiles() {
    const tbody = document.getElementById('files-tbody');
    if (!files || files.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" color="#8b949e" style="margin:0 auto;display:block;">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <p>No files stored yet. Upload something above.</p>
      </td></tr>`;
      return;
    }

    // Identify duplicate hashes for CAS dedup highlight
    const hashCount = {};
    files.forEach(f => { hashCount[f.content_hash] = (hashCount[f.content_hash] || 0) + 1; });

    tbody.innerHTML = files.map(f => {
      const isDup   = hashCount[f.content_hash] > 1;
      const rowClass = isDup ? 'dedup-row' : '';
      const dupTag   = isDup ? '<span class="dedup-tag">CAS dedup</span>' : '';
      const shortHash = f.content_hash ? f.content_hash.slice(0, 12) + '…' : '—';

      return `<tr class="${rowClass}">
        <td class="key-cell">${esc(f.key)}</td>
        <td>
          <div class="hash-cell">
            <span class="hash-chip" title="${esc(f.content_hash)}" onclick="copyHash(this, '${esc(f.content_hash)}')">${shortHash}</span>
            ${dupTag}
          </div>
        </td>
        <td class="size-cell">${fmtSize(f.size)}</td>
        <td>${ttlBadge(f.ttl_remaining)}</td>
        <td>
          <div class="actions">
            <button class="btn-icon download" title="Download" onclick="downloadFile('${esc(f.key)}')">↓</button>
            <button class="btn-icon delete"   title="Delete"   onclick="deleteFile('${esc(f.key)}')">✕</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // ── Upload ─────────────────────────────────────────────────────
  document.getElementById('upload-form').addEventListener('submit', async e => {
    e.preventDefault();
    const key  = document.getElementById('inp-key').value.trim();
    const ttl  = document.getElementById('inp-ttl').value;
    const file = document.getElementById('inp-file').files[0];

    if (!key || !file) { toast('Key and file are required', 'error'); return; }

    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';

    const fd = new FormData();
    fd.append('key', key);
    fd.append('ttl', ttl || '0');
    fd.append('file', file);

    try {
      const res  = await fetch(`${API}/api/files`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');

      showUploadResult(true, `Stored as ${data.content_hash.slice(0, 16)}…`);
      toast(`✓ "${key}" stored (hash: ${data.content_hash.slice(0, 10)}…)`, 'success');
      document.getElementById('upload-form').reset();
      document.getElementById('file-name-display').textContent = '';
      await refresh();
    } catch (err) {
      showUploadResult(false, err.message);
      toast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Upload & Distribute';
    }
  });

  // ── Download ───────────────────────────────────────────────────
  async function downloadFile(key) {
    const a = document.createElement('a');
    a.href     = `${API}/api/files/${encodeURIComponent(key)}`;
    a.download = key;
    a.click();
  }

  // ── Delete ─────────────────────────────────────────────────────
  async function deleteFile(key) {
    if (!confirm(`Delete "${key}"?`)) return;
    try {
      const res = await fetch(`${API}/api/files/${encodeURIComponent(key)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error((await res.json()).error);
      toast(`✓ "${key}" deleted`, 'success');
      await refresh();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Connect peer ───────────────────────────────────────────────
  async function connectPeer() {
    const input = document.getElementById('inp-peer-addr');
    const addr  = input.value.trim();
    if (!addr) { toast('Enter a peer address, e.g. :4001', 'error'); return; }

    try {
      const res  = await fetch(`${API}/api/peers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ addr }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Connection failed');
      input.value = '';
      toast(`✓ Connected to ${addr}`, 'success');
      await refresh();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Copy hash ──────────────────────────────────────────────────
  async function copyHash(el, hash) {
    try {
      await navigator.clipboard.writeText(hash);
      el.classList.add('copied');
      el.textContent = 'copied!';
      setTimeout(() => {
        el.classList.remove('copied');
        el.textContent = hash.slice(0, 12) + '…';
      }, 1500);
    } catch (_) {}
  }

  // ── Drag & drop ────────────────────────────────────────────────
  const dropZone = document.getElementById('file-drop');
  const fileInput = document.getElementById('inp-file');
  fileInput.addEventListener('change', () => {
    document.getElementById('file-name-display').textContent =
      fileInput.files[0] ? fileInput.files[0].name : '';
  });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const dt = e.dataTransfer;
    if (dt.files.length) {
      fileInput.files = dt.files;
      document.getElementById('file-name-display').textContent = dt.files[0].name;
    }
  });

  // ── Helpers ────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtSize(bytes) {
    if (bytes === 0 || bytes == null) return '—';
    if (bytes < 1024)       return bytes + ' B';
    if (bytes < 1048576)    return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
  }

  function ttlBadge(remaining) {
    if (remaining === -1 || remaining == null)
      return '<span class="ttl-badge infinite">∞ infinite</span>';
    if (remaining <= 0)
      return '<span class="ttl-badge expired">expired</span>';
    if (remaining < 60)
      return `<span class="ttl-badge alive">${remaining}s</span>`;
    return `<span class="ttl-badge alive">${Math.ceil(remaining/60)}m</span>`;
  }

  function showUploadResult(ok, msg) {
    const el = document.getElementById('upload-result');
    el.className = 'upload-result ' + (ok ? 'success' : 'error');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent  = msg;
    t.className    = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3500);
  }

  // ── Boot ───────────────────────────────────────────────────────
  refresh();
  setInterval(refresh, 2000);  // live-poll every 2 s
</script>
</body>
</html>
